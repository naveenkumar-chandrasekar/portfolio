<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Naveenkumar C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #05050d;
      --bg3:     #0e0e18;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.11);
      --text:    #f0f0f8;
      --muted:   #7a7a90;
      --purple:  #7c3aed;
      --cyan:    #22d3ee;
      --grad:    linear-gradient(135deg, #7c3aed 0%, #22d3ee 100%);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV (same as main site) ── */
    nav {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 6%;
      background: rgba(5,5,13,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .nav-brand {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }


    /* ── PDF AREA ── */
    .pdf-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .pdf-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-brand">Naveenkumar C</a>
  </nav>

  <div class="pdf-wrap">
    <iframe src="Naveenkumar_C_Resume.pdf" title="Naveenkumar C Resume"></iframe>
  </div>

</body>
</html>
